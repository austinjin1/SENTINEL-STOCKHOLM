name: SENTINEL CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install flake8
      - run: flake8 sentinel/ --max-line-length=120 --ignore=E501,W503,E203

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run tests
        run: pytest tests/ -v --tb=short -x

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Check all Python files parse
        run: |
          find sentinel/ scripts/ -name "*.py" -exec python -c "
          import ast, sys
          try:
              ast.parse(open(sys.argv[1]).read())
          except SyntaxError as e:
              print(f'FAIL: {sys.argv[1]}: {e}')
              sys.exit(1)
          " {} \;

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t sentinel:test .
      - name: Test Docker container starts
        run: |
          docker run -d --name sentinel-test -p 8501:8501 sentinel:test
          sleep 10
          curl -f http://localhost:8501 || true
          docker stop sentinel-test
